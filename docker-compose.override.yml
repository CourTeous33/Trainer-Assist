# Local development overrides: expose Postgres and Redis ports to host
# This file is auto-loaded by docker compose alongside docker-compose.yml
services:
  postgres:
    ports:
      - "5433:5432"
  redis:
    ports:
      - "6380:6379"
  api:
    ports:
      - "3001:3001"
  frontend:
    ports:
      - "3000:3000"
